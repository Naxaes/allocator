<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Allocation Event Grid Visualizer</title>
    <link rel="stylesheet" type="text/css" href="index.css">
</head>
<body>
<div class="app">
    <h1>Allocation Event Grid Visualizer</h1>
    <p>Step through allocation events loaded from <code>events.json</code> next to <code>index.html</code> and view memory by page, including overlapping parent/child allocator usage.</p>

    <section class="card">
        <div class="card-body">
            <div class="controls-row">
                <button id="resetBtn">Reset</button>
                <button id="prevBtn">Prev</button>
                <button id="playBtn" class="primary">Play</button>
                <button id="nextBtn">Next</button>
            </div>

            <div class="step-meta">
                <span id="stepLabel">Step 0 / 0</span>
                <span id="eventLabel">Initial state</span>
            </div>

            <input id="stepSlider" type="range" min="0" max="0" step="1" value="0" />
        </div>
    </section>

    <section class="card">
        <div class="card-body">
            <div class="legend">
                <div class="legend-item"><span class="legend-swatch"></span><span>Free page space</span></div>
                <div class="legend-item"><span class="legend-swatch used"></span><span>Allocator usage</span></div>
            </div>
            <div class="grid-wrap">
                <div id="memoryGrid" class="memory-grid"></div>
            </div>
            <div id="summary" class="summary"></div>
            <div id="regionLegend" class="region-legend"></div>
        </div>
    </section>
</div>

<script type="text/javascript" src="index.js"></script>

</body>
</html>
